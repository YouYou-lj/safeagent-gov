name: release-desktop

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    uses: ./.github/workflows/build-macos.yml
  windows:
    uses: ./.github/workflows/build-windows.yml
  linux:
    uses: ./.github/workflows/build-linux.yml
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows, linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create draft GitHub Release from native artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" artifacts/**/* --verify-tag --generate-notes --draft
          --title "$GITHUB_REF_NAME native CI candidate"
