name: release-macos-signed

on:
  workflow_call:
    secrets:
      APPLE_CERTIFICATE:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      APPLE_SIGNING_IDENTITY:
        required: true
      APPLE_API_ISSUER:
        required: true
      APPLE_API_KEY:
        required: true
      APPLE_API_PRIVATE_KEY:
        required: true
      KEYCHAIN_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  build:
    name: signed-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-14
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    environment: macos-release
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.7.0"
          enable-cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24.3.0"
          cache: npm
          cache-dependency-path: |
            frontend-vue/package-lock.json
            desktop/package-lock.json
      - name: Build isolated Python environment
        run: python3 scripts/setup_uv_env.py
      - name: Install locked frontend and desktop dependencies
        run: |
          npm ci --prefix frontend-vue --ignore-scripts --no-audit --no-fund
          npm ci --prefix desktop --ignore-scripts --no-audit --no-fund
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/safeagent-developer-id.p12"
          keychain_path="$RUNNER_TEMP/safeagent-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" | grep -F "$APPLE_SIGNING_IDENTITY"
          echo "SAFEAGENT_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
      - name: Install App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and verify macOS release
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          SAFEAGENT_MAC_RECLAIM_TIMEOUT_SECONDS: "30"
        run: bash desktop/mac/build-release.sh
      - name: Remove temporary signing material
        if: always()
        run: |
          security delete-keychain "$SAFEAGENT_SIGNING_KEYCHAIN" || true
          rm -f "$RUNNER_TEMP/safeagent-developer-id.p12" "$APPLE_API_KEY_PATH"
      - uses: actions/upload-artifact@v7
        with:
          name: safeagent-gov-macos-signed-${{ matrix.arch }}
          path: release/mac/*.dmg
          if-no-files-found: error
