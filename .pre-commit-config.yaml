repos:
  - repo: local
    hooks:
      - id: critical-python-lint
        name: critical Python lint
        entry: python -m ruff check --select E9,F63,F7,F82
        language: system
        types: [python]
      - id: repository-contracts
        name: repository contracts
        entry: python -m pytest tests/test_repository_contracts.py -q
        language: system
        pass_filenames: false
        always_run: true
