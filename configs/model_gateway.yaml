version: "1.0.0"
default_provider: deterministic
max_concurrency: 32
cache_ttl_seconds: 300
max_cache_entries: 512
server_max_cost_usd: 1.0

# Provider profiles contain no secret values. credential_env names a runtime
# environment variable; remote profiles remain disabled until an operator
# deliberately supplies credentials and enables one profile.
providers:
  deterministic:
    display_name: Deterministic Offline Baseline
    protocol: internal
    model: safeagent-deterministic-v1
    endpoint: null
    credential_env: null
    enabled: true
    network_access: false
    private_deployment: true
    capabilities: [chat, structured_output, long_context, tool_planning, code]
    task_types: [general]
    max_context_tokens: 131072
    max_output_tokens: 32768
    prompt_cost_per_million_usd: 0.0
    completion_cost_per_million_usd: 0.0
    priority: 1000
    timeout_seconds: 1.0
    max_attempts: 1
    circuit_failure_threshold: 3
    circuit_recovery_seconds: 5.0

  openai-chat:
    display_name: OpenAI Chat Completions
    protocol: openai_chat_completions
    model: configured-openai-chat-model
    endpoint: https://api.openai.com/v1/chat/completions
    credential_env: SAFEAGENT_OPENAI_API_KEY
    enabled: false
    network_access: true
    private_deployment: false
    capabilities: [chat, structured_output, long_context, tool_planning, code]
    task_types: [general]
    max_context_tokens: 128000
    max_output_tokens: 16384
    prompt_cost_per_million_usd: 1.0
    completion_cost_per_million_usd: 4.0
    priority: 20
    timeout_seconds: 15.0
    max_attempts: 2
    circuit_failure_threshold: 3
    circuit_recovery_seconds: 30.0

  openai-responses:
    display_name: OpenAI Responses API
    protocol: openai_responses
    model: configured-openai-responses-model
    endpoint: https://api.openai.com/v1/responses
    credential_env: SAFEAGENT_OPENAI_API_KEY
    enabled: false
    network_access: true
    private_deployment: false
    capabilities: [chat, structured_output, long_context, tool_planning, code]
    task_types: [general]
    max_context_tokens: 128000
    max_output_tokens: 32768
    prompt_cost_per_million_usd: 1.0
    completion_cost_per_million_usd: 4.0
    priority: 10
    timeout_seconds: 15.0
    max_attempts: 2
    circuit_failure_threshold: 3
    circuit_recovery_seconds: 30.0

  anthropic:
    display_name: Anthropic Messages API
    protocol: anthropic_messages
    model: configured-claude-model
    endpoint: https://api.anthropic.com/v1/messages
    credential_env: SAFEAGENT_ANTHROPIC_API_KEY
    enabled: false
    network_access: true
    private_deployment: false
    capabilities: [chat, structured_output, long_context, tool_planning, code]
    task_types: [general]
    max_context_tokens: 200000
    max_output_tokens: 32768
    prompt_cost_per_million_usd: 3.0
    completion_cost_per_million_usd: 15.0
    priority: 20
    timeout_seconds: 20.0
    max_attempts: 2
    circuit_failure_threshold: 3
    circuit_recovery_seconds: 30.0

