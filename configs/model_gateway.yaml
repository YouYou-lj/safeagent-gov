routing_rules:
  general:
    candidates: [openai-responses, anthropic, gemini, deterministic]
    required_capabilities: [chat]
    private_only: false
    max_latency_ms: null
  prompt_shield_review:
    candidates: [vllm, ollama, openai-chat, qwen, deterministic]
    required_capabilities: [structured_output]
    private_only: false
    max_latency_ms: 5000
  document_summary:
    candidates: [anthropic, gemini, openai-responses, deterministic]
    required_capabilities: [long_context]
    private_only: false
    max_latency_ms: null
  high_risk_decision:
    candidates: [openai-responses, anthropic, azure-openai, deterministic]
    required_capabilities: [structured_output]
    private_only: false
    max_latency_ms: null
  tool_planning:
    candidates: [openai-responses, anthropic, qwen, vllm, deterministic]
    required_capabilities: [tool_planning]
    private_only: false
    max_latency_ms: null
  skill_scan:
    candidates: [vllm, openai-responses, qwen, deterministic]
    required_capabilities: [code]
    private_only: false
    max_latency_ms: null
  local_private_mode:
    candidates: [vllm, ollama, deterministic]
    required_capabilities: [chat]
    private_only: true
    max_latency_ms: null
